<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ChannelSurf Receiver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; }
    #player-wrap { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
    #player { width: 100%; height: 100%; }

    /* --- Transitions --- */
    .transition-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 5; pointer-events: none; opacity: 0; transition: opacity 0.3s ease;
    }
    .transition-overlay.active { opacity: 1; }
    #trans-fade { background: #000; }
    #trans-static canvas { width: 100%; height: 100%; }
    #trans-glitch { background: #000; overflow: hidden; }
    .glitch-bar { position: absolute; left: 0; width: 100%; }
    #trans-channel {
      background: #0033aa; display: flex; align-items: center; justify-content: center;
    }
    #trans-channel .no-signal {
      font-size: 48px; font-weight: bold; color: #fff;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.5); letter-spacing: 8px;
    }
    #trans-vhs canvas { width: 100%; height: 100%; }
    #trans-pixel canvas { width: 100%; height: 100%; }
    #trans-crt { background: #000; display: flex; align-items: center; justify-content: center; }
    #trans-crt .crt-line {
      width: 100%; height: 2px; background: #fff;
      box-shadow: 0 0 20px 8px rgba(255,255,255,0.5);
      transition: all 0.4s ease-in;
    }
    #trans-crt .crt-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #fff;
      box-shadow: 0 0 15px 5px rgba(255,255,255,0.8);
      position: absolute; opacity: 0; transition: opacity 0.3s ease;
    }
    #trans-flash { background: #fff; }
    #trans-scan { background: #000; overflow: hidden; }
    #trans-scan .scan-num {
      font-size: 72px; font-weight: bold; color: #0f0;
      position: absolute; top: 40px; right: 60px;
      text-shadow: 0 0 10px rgba(0,255,0,0.8);
    }
    #trans-scan canvas { width: 100%; height: 100%; }

    /* --- CRT Overlay --- */
    #crt-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 6; pointer-events: none; display: none; }
    #crt-overlay.active { display: block; }
    #crt-scanlines {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
    }
    #crt-vignette {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
    }
    #crt-bezel {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      border: 12px solid #1a1a1a; border-radius: 20px;
      box-shadow: inset 0 0 80px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.3), 0 0 30px rgba(0,0,0,0.8);
    }
    #crt-glare {
      position: absolute; top: 5%; left: 5%; width: 40%; height: 30%;
      background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
      border-radius: 50%;
    }

    /* Logo */
    #logo {
      position: fixed; top: 16px; left: 20px; z-index: 9;
      width: 120px; height: auto; opacity: 0.85; pointer-events: none;
      filter: drop-shadow(0 0 6px rgba(255,69,0,0.4));
    }

    /* Channel number */
    #channel-num {
      position: fixed; top: 30px; right: 40px; z-index: 9;
      font-size: 42px; font-weight: bold; color: #0f0;
      text-shadow: 0 0 8px rgba(0,255,0,0.6), 2px 2px 0 rgba(0,0,0,0.8);
      opacity: 0; transition: opacity 0.4s; pointer-events: none; letter-spacing: 3px;
    }
    #channel-num.visible { opacity: 1; }
    #channel-num.fade-out { opacity: 0; transition: opacity 1.5s ease 3s; }

    /* Status */
    #status {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 10;
      font-size: 14px; background: rgba(0,0,0,0.6);
      padding: 8px 18px; border-radius: 8px;
      max-width: 80vw; text-align: center; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* Progress bar */
    #progress-bar { position: fixed; bottom: 0; left: 0; width: 100vw; height: 3px; z-index: 8; background: rgba(255,255,255,0.1); }
    #progress-fill { height: 100%; width: 100%; background: rgba(255,255,255,0.3); transform-origin: left; }

    /* Idle screen */
    #idle-screen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 20;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #000;
    }
    #idle-screen.hidden { display: none; }
    #idle-screen img { width: 240px; margin-bottom: 30px; }
    #idle-screen .waiting { font-size: 18px; color: #666; font-family: -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="idle-screen">
    <img src="logo-sm.png" alt="ChannelSurf" />
    <div class="waiting">Waiting for connection...</div>
  </div>

  <div id="player-wrap"><div id="player"></div></div>

  <!-- Transitions -->
  <div class="transition-overlay" id="trans-fade"></div>
  <div class="transition-overlay" id="trans-static"><canvas id="static-canvas"></canvas></div>
  <div class="transition-overlay" id="trans-glitch"></div>
  <div class="transition-overlay" id="trans-channel"><div class="no-signal">NO SIGNAL</div></div>
  <div class="transition-overlay" id="trans-vhs"><canvas id="vhs-canvas"></canvas></div>
  <div class="transition-overlay" id="trans-pixel"><canvas id="pixel-canvas"></canvas></div>
  <div class="transition-overlay" id="trans-crt"><div class="crt-line"></div><div class="crt-dot"></div></div>
  <div class="transition-overlay" id="trans-flash"></div>
  <div class="transition-overlay" id="trans-scan"><canvas id="scan-canvas"></canvas><div class="scan-num">CH 01</div></div>

  <!-- Overlays -->
  <div id="crt-overlay">
    <div id="crt-scanlines"></div>
    <div id="crt-vignette"></div>
    <div id="crt-bezel"></div>
    <div id="crt-glare"></div>
  </div>
  <img id="logo" src="logo-sm.png" alt="ChannelSurf" />
  <div id="channel-num">CH 01</div>
  <div id="status"></div>
  <div id="progress-bar"><div id="progress-fill"></div></div>

  <!-- Cast Receiver SDK -->
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <script>
    // --- Helpers ---
    const $ = id => document.getElementById(id);
    const status = $('status');

    // --- State ---
    let player = null;
    let ytReady = false;
    let allVideos = [];
    let videoIds = [];
    let playing = false;
    let clipTimer = null;
    let lastPlayed = [];
    let seekDone = false;
    let channelNumber = 0;
    let channelFadeTimer = null;
    let clipStartTime = 0;
    let progressAnimId = null;
    let staticAnimId = null, vhsAnimId = null, pixelAnimId = null, scanAnimId = null, scanNumInterval = null;

    // Settings (received from sender)
    let settings = {
      playlistId: '',
      clipLength: 45,
      fadeLength: 1.5,
      transition: 'random',
      crtMode: false,
      showChannel: true,
      showTitle: true
    };

    // --- Cast Receiver Setup ---
    const castCtx = cast.framework.CastReceiverContext.getInstance();
    const NAMESPACE = 'urn:x-cast:com.channelsurf';

    castCtx.addCustomMessageListener(NAMESPACE, event => {
      const msg = event.data;
      console.log('Cast message:', msg);

      switch (msg.type) {
        case 'START':
          settings = { ...settings, ...msg.settings };
          $('crt-overlay').classList.toggle('active', settings.crtMode);
          startSurfing(settings.playlistId);
          break;
        case 'SKIP':
          playNext();
          break;
        case 'STOP':
          stopSurfing();
          break;
        case 'SETTINGS':
          settings = { ...settings, ...msg.settings };
          $('crt-overlay').classList.toggle('active', settings.crtMode);
          break;
      }
    });

    castCtx.start({ disableIdleTimeout: true });

    // --- YouTube Ready ---
    window.onYouTubeIframeAPIReady = () => {
      player = new YT.Player('player', {
        playerVars: { autoplay: 0, controls: 0, disablekb: 1, fs: 0, modestbranding: 1, rel: 0, showinfo: 0, iv_load_policy: 3, playsinline: 1 },
        events: {
          onReady: () => { ytReady = true; },
          onStateChange: onPlayerState,
          onError: () => { if (playing) setTimeout(playNext, 2000); }
        }
      });
    };

    // --- Start surfing ---
    async function startSurfing(playlistId) {
      if (!ytReady || !playlistId) return;
      $('idle-screen').classList.add('hidden');
      showStatus('Loading playlist...');

      try {
        const ids = await fetchPlaylistVideos(playlistId);
        showStatus(`Found ${ids.length} videos`);
        // Simple mode for receiver — no category scanning, just play everything
        allVideos = ids.map(id => ({ id, title: '' }));
        videoIds = [...ids];
        playing = true;
        channelNumber = 0;
        playNext();
      } catch (e) {
        showStatus('Failed: ' + e);
      }
    }

    function stopSurfing() {
      playing = false;
      clearTimeout(clipTimer);
      stopProgressBar();
      if (player) player.stopVideo();
      hideAllTransitions();
      channelNumber = 0;
      $('channel-num').classList.remove('visible', 'fade-out');
      $('idle-screen').classList.remove('hidden');
      showStatus('');
    }

    // --- Fetch playlist ---
    function fetchPlaylistVideos(playlistId) {
      return new Promise((resolve, reject) => {
        player.cuePlaylist({ list: playlistId, listType: 'playlist' });
        const check = setInterval(() => {
          const list = player.getPlaylist();
          if (list && list.length > 0) { clearInterval(check); resolve(list); }
        }, 500);
        setTimeout(() => { clearInterval(check); reject('Timeout'); }, 15000);
      });
    }

    // --- Playback ---
    function pickRandom() {
      if (videoIds.length === 0) return null;
      const available = videoIds.filter(id => !lastPlayed.includes(id));
      const pool = available.length > 0 ? available : videoIds;
      const pick = pool[Math.floor(Math.random() * pool.length)];
      lastPlayed.push(pick);
      if (lastPlayed.length > Math.min(10, Math.floor(videoIds.length * 0.5))) lastPlayed.shift();
      return pick;
    }

    function playNext() {
      if (!playing) return;
      clearTimeout(clipTimer);
      const videoId = pickRandom();
      if (!videoId) return;
      const fadeSec = settings.fadeLength;
      showTransition(getTransitionType());
      showChannelNumber();
      setTimeout(() => { seekDone = false; player.loadVideoById(videoId); }, fadeSec * 1000);
    }

    function onPlayerState(event) {
      if (event.data === YT.PlayerState.PLAYING) {
        const clipLen = settings.clipLength;
        const duration = player.getDuration();
        const isLive = !duration || !isFinite(duration);

        if (!seekDone && !isLive) {
          seekDone = true;
          if (duration > clipLen + 10) {
            const maxStart = duration - clipLen - 5;
            player.seekTo(Math.max(5, Math.random() * maxStart), true);
            return;
          }
        }

        setTimeout(() => hideAllTransitions(), 300);

        if (settings.showTitle) {
          try {
            const data = player.getVideoData();
            showStatus(data.title || 'Playing...');
          } catch (e) { showStatus('Playing...'); }
        } else { status.style.opacity = '0'; }

        clipStartTime = Date.now();
        startProgressBar(clipLen);
        clipTimer = setTimeout(() => playNext(), clipLen * 1000);
      } else if (event.data === YT.PlayerState.ENDED) { playNext(); }
    }

    // --- Channel Number ---
    function showChannelNumber() {
      if (!settings.showChannel) return;
      channelNumber++;
      const el = $('channel-num');
      el.textContent = 'CH ' + String(channelNumber).padStart(2, '0');
      el.classList.remove('fade-out');
      el.classList.add('visible');
      clearTimeout(channelFadeTimer);
      channelFadeTimer = setTimeout(() => el.classList.add('fade-out'), 100);
    }

    // --- Status ---
    function showStatus(msg) { status.textContent = msg; status.style.opacity = msg ? '1' : '0'; }

    // --- Progress Bar ---
    function startProgressBar(clipLen) {
      cancelAnimationFrame(progressAnimId);
      const fill = $('progress-fill');
      const totalMs = clipLen * 1000;
      function tick() {
        const r = Math.max(0, 1 - ((Date.now() - clipStartTime) / totalMs));
        fill.style.transform = 'scaleX(' + r + ')';
        if (r > 0 && playing) progressAnimId = requestAnimationFrame(tick);
      }
      tick();
    }
    function stopProgressBar() { cancelAnimationFrame(progressAnimId); $('progress-fill').style.transform = 'scaleX(0)'; }

    // =====================================================
    // TRANSITIONS (same as main app)
    // =====================================================

    // --- Static ---
    const staticCanvas = $('static-canvas');
    const staticCtx = staticCanvas.getContext('2d');
    function resizeStaticCanvas() { staticCanvas.width = window.innerWidth; staticCanvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeStaticCanvas); resizeStaticCanvas();
    function drawStatic() {
      const w = staticCanvas.width, h = staticCanvas.height;
      const img = staticCtx.createImageData(w, h);
      for (let i = 0; i < img.data.length; i += 4) {
        const v = Math.random() * 255;
        img.data[i] = v; img.data[i+1] = v; img.data[i+2] = v; img.data[i+3] = 255;
      }
      staticCtx.putImageData(img, 0, 0);
      staticAnimId = requestAnimationFrame(drawStatic);
    }
    function startStatic() { if (!staticAnimId) drawStatic(); }
    function stopStatic() { if (staticAnimId) { cancelAnimationFrame(staticAnimId); staticAnimId = null; } }

    // --- Glitch ---
    function startGlitch() {
      const el = $('trans-glitch'); el.innerHTML = '';
      for (let i = 0; i < 20; i++) {
        const bar = document.createElement('div'); bar.className = 'glitch-bar';
        bar.style.height = (Math.random()*40+5)+'px'; bar.style.top = (Math.random()*100)+'%';
        bar.style.background = `rgba(${Math.random()*255},${Math.random()*255},${Math.random()*255},${Math.random()*0.3+0.1})`;
        bar.style.transform = `translateX(${(Math.random()-0.5)*40}px)`;
        el.appendChild(bar);
      }
    }

    // --- VHS ---
    const vhsCanvas = $('vhs-canvas'); const vhsCtx = vhsCanvas.getContext('2d');
    function resizeVhsCanvas() { vhsCanvas.width = window.innerWidth; vhsCanvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeVhsCanvas); resizeVhsCanvas();
    function drawVhs() {
      const w = vhsCanvas.width, h = vhsCanvas.height;
      vhsCtx.fillStyle = '#000'; vhsCtx.fillRect(0, 0, w, h);
      for (let i = 0; i < 12; i++) {
        const y = Math.random() * h, thickness = Math.random() * 8 + 2;
        vhsCtx.fillStyle = `rgba(${180+Math.random()*75},${180+Math.random()*75},${180+Math.random()*75},${Math.random()*0.4+0.1})`;
        vhsCtx.fillRect((Math.random()-0.5)*60, y, w, thickness);
      }
      for (let i = 0; i < 4; i++) {
        const colors = ['rgba(255,0,0,0.15)','rgba(0,255,255,0.15)','rgba(255,0,255,0.12)'];
        vhsCtx.fillStyle = colors[Math.floor(Math.random()*colors.length)];
        vhsCtx.fillRect(0, Math.random()*h, w, Math.random()*30+5);
      }
      const bandY = (Date.now()/8) % (h+200) - 100;
      vhsCtx.fillStyle = 'rgba(255,255,255,0.08)'; vhsCtx.fillRect(0, bandY, w, 80);
      vhsAnimId = requestAnimationFrame(drawVhs);
    }
    function startVhs() { if (!vhsAnimId) drawVhs(); }
    function stopVhs() { if (vhsAnimId) { cancelAnimationFrame(vhsAnimId); vhsAnimId = null; } }

    // --- Pixel Dissolve ---
    const pixelCanvas = $('pixel-canvas'); const pixelCtx = pixelCanvas.getContext('2d');
    let pixelBlocks = [], pixelStartMs = 0;
    function resizePixelCanvas() { pixelCanvas.width = window.innerWidth; pixelCanvas.height = window.innerHeight; }
    window.addEventListener('resize', resizePixelCanvas); resizePixelCanvas();
    function startPixel() {
      const w = pixelCanvas.width, h = pixelCanvas.height, bs = 24;
      const cols = Math.ceil(w/bs), rows = Math.ceil(h/bs);
      pixelBlocks = [];
      for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++)
        pixelBlocks.push({ x:c*bs, y:r*bs, w:bs, h:bs, delay:Math.random()*800, color:`rgb(${Math.random()*40|0},${Math.random()*40|0},${Math.random()*40|0})` });
      pixelStartMs = Date.now(); drawPixel();
    }
    function drawPixel() {
      const elapsed = Date.now() - pixelStartMs;
      pixelCtx.clearRect(0, 0, pixelCanvas.width, pixelCanvas.height);
      for (const b of pixelBlocks) if (elapsed > b.delay) { pixelCtx.fillStyle = b.color; pixelCtx.fillRect(b.x, b.y, b.w, b.h); }
      if (elapsed < 1200) pixelAnimId = requestAnimationFrame(drawPixel);
    }
    function stopPixel() { if (pixelAnimId) { cancelAnimationFrame(pixelAnimId); pixelAnimId = null; } }

    // --- CRT Power Off ---
    function startCrt() {
      const line = document.querySelector('.crt-line'), dot = document.querySelector('.crt-dot');
      line.style.transition = 'none'; line.style.width = '100%'; line.style.height = '100vh'; line.style.opacity = '1';
      dot.style.opacity = '0';
      requestAnimationFrame(() => {
        line.style.transition = 'all 0.3s ease-in'; line.style.height = '2px';
        setTimeout(() => { line.style.transition = 'all 0.2s ease-in'; line.style.width = '0px'; line.style.opacity = '0';
          dot.style.opacity = '1'; setTimeout(() => dot.style.opacity = '0', 500);
        }, 350);
      });
    }

    // --- Channel Scan ---
    const scanCanvas = $('scan-canvas'); const scanCtx = scanCanvas.getContext('2d');
    function resizeScanCanvas() { scanCanvas.width = window.innerWidth; scanCanvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeScanCanvas); resizeScanCanvas();
    function drawScanStatic() {
      const w = scanCanvas.width, h = scanCanvas.height;
      const img = scanCtx.createImageData(w, h);
      for (let i = 0; i < img.data.length; i += 4) { const v = Math.random()*200; img.data[i]=v; img.data[i+1]=v; img.data[i+2]=v; img.data[i+3]=255; }
      scanCtx.putImageData(img, 0, 0);
      scanAnimId = requestAnimationFrame(drawScanStatic);
    }
    function startScan() {
      drawScanStatic();
      let ch = Math.floor(Math.random()*80)+1;
      const numEl = document.querySelector('.scan-num');
      numEl.textContent = 'CH ' + String(ch).padStart(2,'0');
      scanNumInterval = setInterval(() => { ch = Math.floor(Math.random()*99)+1; numEl.textContent = 'CH ' + String(ch).padStart(2,'0'); }, 200);
    }
    function stopScan() {
      if (scanAnimId) { cancelAnimationFrame(scanAnimId); scanAnimId = null; }
      if (scanNumInterval) { clearInterval(scanNumInterval); scanNumInterval = null; }
    }

    // --- Transition orchestration ---
    const overlayIds = ['trans-fade','trans-static','trans-glitch','trans-channel','trans-vhs','trans-pixel','trans-crt','trans-flash','trans-scan'];
    function hideAllTransitions() {
      overlayIds.forEach(id => $(id).classList.remove('active'));
      stopStatic(); stopVhs(); stopPixel(); stopScan();
      const line = document.querySelector('.crt-line'), dot = document.querySelector('.crt-dot');
      if (line) { line.style.width = '100%'; line.style.height = '2px'; line.style.opacity = '1'; }
      if (dot) dot.style.opacity = '0';
    }
    const allTransTypes = ['static','fade','glitch','channel','vhs','pixel','crt','flash','scan'];
    function getTransitionType() {
      if (settings.transition === 'random') return allTransTypes[Math.floor(Math.random()*allTransTypes.length)];
      return settings.transition;
    }
    function showTransition(type) {
      hideAllTransitions();
      if (type === 'static') startStatic();
      if (type === 'glitch') startGlitch();
      if (type === 'vhs') startVhs();
      if (type === 'pixel') startPixel();
      if (type === 'crt') startCrt();
      if (type === 'scan') startScan();
      $('trans-'+type).classList.add('active');
    }
  </script>
</body>
</html>
